name: 股癌選股自動更新

on:
  schedule:
    # 時間為 UTC。台灣 = UTC+8
    - cron: "0 13 * * 3"   # 週三 21:00 台灣
    - cron: "0 13 * * 6"   # 週六 21:00 台灣
    - cron: "0 0 * * 4"    # 週四 08:00 台灣 (補抓, 防逐字稿延遲)
    - cron: "0 0 * * 0"    # 週日 08:00 台灣 (補抓)
  workflow_dispatch:        # 也可在 GitHub 網頁上手動按一下觸發

permissions:
  contents: write           # 允許把更新後的網頁與資料寫回 repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 跑更新 (抓新集→抽取→更新線型→重生網頁)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_update.py

      - name: 提交更新結果
        run: |
          git config user.name "gooaye-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A docs data
          git commit -m "auto update $(date -u +%Y-%m-%d)" || echo "無變更"
          git push
